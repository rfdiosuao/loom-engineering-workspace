name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update"
        required: true
        type: string
      portable_seed_tag:
        description: "Optional previous release tag used as portable seed"
        required: false
        type: string
      phone_agent_apk_url:
        description: "Optional AgentPhone_latest.apk download URL"
        required: false
        type: string
      phone_agent_version:
        description: "Optional phone agent versionName, for example 6.23"
        required: false
        type: string
      phone_agent_version_code:
        description: "Optional phone agent versionCode, for example 830"
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Windows release build
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: openclaw_new_launcher/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        run: |
          rustup default stable
          rustup show

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            openclaw_new_launcher/src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('openclaw_new_launcher/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        working-directory: openclaw_new_launcher
        run: npm ci

      - name: Verify source text
        run: powershell -ExecutionPolicy Bypass -File scripts\verify-source-text.ps1

      - name: Verify source secrets
        run: powershell -ExecutionPolicy Bypass -File scripts\verify-release-secrets.ps1 -Source

      - name: Verify version consistency
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: powershell -ExecutionPolicy Bypass -File scripts\verify-version-consistency.ps1 -TagName $env:RELEASE_TAG

      - name: Build frontend
        working-directory: openclaw_new_launcher
        run: npm run build

      - name: Check Rust
        working-directory: openclaw_new_launcher/src-tauri
        run: cargo check

      - name: Import Windows code-signing certificate
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_PASSWORD)) {
            throw "Stable Windows releases require WINDOWS_PFX_BASE64 and WINDOWS_PFX_PASSWORD."
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "loom-code-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $password = ConvertTo-SecureString $env:WINDOWS_PFX_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          Remove-Item -LiteralPath $pfxPath -Force
          if (-not $certificate -or -not $certificate.HasPrivateKey) {
            throw "Imported Windows code-signing certificate has no private key."
          }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build signed protected NSIS
        working-directory: openclaw_new_launcher
        run: |
          npm run package:protected:nsis
          if ($LASTEXITCODE -ne 0) {
            throw "Protected NSIS build failed with exit code $LASTEXITCODE"
          }

          $version = node -p "require('./package.json').version"
          $bundleDir = Join-Path $PWD "src-tauri\target\release\bundle\nsis"
          $builtInstaller = Get-ChildItem -LiteralPath $bundleDir -File -Filter "*$version*_x64-setup.exe" |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $builtInstaller) {
            throw "Protected NSIS output is missing under $bundleDir"
          }

          $certificate = Get-Item -LiteralPath "Cert:\CurrentUser\My\$env:WINDOWS_CERTIFICATE_THUMBPRINT"
          $signature = Set-AuthenticodeSignature `
            -FilePath $builtInstaller.FullName `
            -Certificate $certificate `
            -HashAlgorithm SHA256 `
            -TimestampServer "http://timestamp.digicert.com"
          if ($signature.Status -ne "Valid") {
            throw "Protected NSIS signature is not valid: $($signature.Status) $($signature.StatusMessage)"
          }

          $outputRoot = Join-Path (Split-Path -Parent $PWD) "ci_release_nsis"
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          $outputPath = Join-Path $outputRoot "LOOM-$version-setup.exe"
          Copy-Item -LiteralPath $builtInstaller.FullName -Destination $outputPath -Force
          $hash = Get-FileHash -LiteralPath $outputPath -Algorithm SHA256
          "$($hash.Hash)  $(Split-Path -Leaf $outputPath)" |
            Set-Content -LiteralPath "$outputPath.sha256.txt" -Encoding ASCII

      - name: Smoke-test the exact complete installer
        run: |
          $version = node -p "require('./openclaw_new_launcher/package.json').version"
          $installer = Join-Path $PWD "ci_release_nsis\LOOM-$version-setup.exe"
          $smokeRoot = Join-Path $PWD "artifacts\ci-nsis-smoke"
          $chineseUser = ([string][char]0x4E2D) + ([char]0x6587) + ([char]0x7528) + ([char]0x6237)
          $luming = ([string][char]0x9E93) + ([char]0x9E23)
          $paths = @(
            (Join-Path $smokeRoot "ascii\LOOM"),
            (Join-Path $smokeRoot "$chineseUser\$luming")
          )
          & .\scripts\smoke-test-tauri-nsis.ps1 `
            -Installer $installer `
            -SmokeRoot $smokeRoot `
            -InstallPaths $paths

      - name: Prepare portable seed
        env:
          GH_TOKEN: ${{ github.token }}
          PORTABLE_SEED_TAG: ${{ inputs.portable_seed_tag || '' }}
        run: |
          $seedRoot = Join-Path $PWD "ci_seed"
          $downloadDir = Join-Path $seedRoot "download"
          $extractDir = Join-Path $seedRoot "extract"
          New-Item -ItemType Directory -Path $downloadDir -Force | Out-Null
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null

          $downloadArgs = @("release", "download", "--repo", $env:GITHUB_REPOSITORY, "--pattern", "*Portable-*.zip", "--dir", $downloadDir)
          if (-not [string]::IsNullOrWhiteSpace($env:PORTABLE_SEED_TAG)) {
            $downloadArgs = @("release", "download", $env:PORTABLE_SEED_TAG, "--repo", $env:GITHUB_REPOSITORY, "--pattern", "*Portable-*.zip", "--dir", $downloadDir)
          }

          gh @downloadArgs
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Unable to download previous portable seed. The portable build will bootstrap runtime dependencies instead."
            "PORTABLE_SEED_DIR=" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            return
          }

          $seedZip = Get-ChildItem -LiteralPath $downloadDir -File -Filter "*Portable-*.zip" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $seedZip) {
            Write-Warning "No portable seed was downloaded. The portable build will bootstrap runtime dependencies instead."
            "PORTABLE_SEED_DIR=" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            return
          }

          Expand-Archive -LiteralPath $seedZip.FullName -DestinationPath $extractDir -Force

          $seedCandidates = @()
          $seedCandidates += Get-ChildItem -LiteralPath $extractDir -Directory -ErrorAction SilentlyContinue
          $seedCandidates += Get-Item -LiteralPath $extractDir
          $seedDir = $seedCandidates |
            Where-Object {
              (Test-Path -LiteralPath (Join-Path $_.FullName "LOOM.exe")) -or
              (Test-Path -LiteralPath (Join-Path $_.FullName "LOOMFiles")) -or
              (Test-Path -LiteralPath (Join-Path $_.FullName "OpenClaw.exe")) -or
              (Test-Path -LiteralPath (Join-Path $_.FullName "OpenClawFiles")) -or
              (Test-Path -LiteralPath (Join-Path $_.FullName "node\node.exe"))
            } |
            Select-Object -First 1

          if (-not $seedDir) {
            Write-Warning "Downloaded seed zip does not look like an OpenClaw portable package: $($seedZip.FullName). The portable build will bootstrap runtime dependencies instead."
            "PORTABLE_SEED_DIR=" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            return
          }

          "PORTABLE_SEED_DIR=$($seedDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Portable seed: $($seedZip.Name) -> $($seedDir.FullName)"

      - name: Prepare phone agent APK
        env:
          PHONE_AGENT_APK_URL: ${{ inputs.phone_agent_apk_url || vars.PHONE_AGENT_APK_URL || '' }}
          PHONE_AGENT_APK_SHA256: ${{ vars.PHONE_AGENT_APK_SHA256 || '' }}
        run: |
          $apkPath = Join-Path $PWD "openclaw_new_launcher\AgentPhone_latest.apk"
          if (-not [string]::IsNullOrWhiteSpace($env:PHONE_AGENT_APK_URL)) {
            Write-Host "Downloading AgentPhone_latest.apk from configured URL..."
            Invoke-WebRequest -Uri $env:PHONE_AGENT_APK_URL -OutFile $apkPath
          }

          if (-not (Test-Path -LiteralPath $apkPath)) {
            Write-Warning "AgentPhone_latest.apk is missing. Portable package will be built without bundled phone APK."
            return
          }

          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $apkPath
          Write-Host "AgentPhone_latest.apk SHA256: $($hash.Hash)"
          if (-not [string]::IsNullOrWhiteSpace($env:PHONE_AGENT_APK_SHA256) -and $hash.Hash -ne $env:PHONE_AGENT_APK_SHA256) {
            throw "AgentPhone_latest.apk SHA256 mismatch. Expected $env:PHONE_AGENT_APK_SHA256, got $($hash.Hash)."
          }

      - name: Build portable package
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
          PHONE_AGENT_VERSION: ${{ inputs.phone_agent_version || vars.PHONE_AGENT_VERSION || '' }}
          PHONE_AGENT_VERSION_CODE: ${{ inputs.phone_agent_version_code || vars.PHONE_AGENT_VERSION_CODE || '0' }}
        run: |
          $tag = $env:RELEASE_TAG
          $version = $tag -replace '^v', ''
          $date = Get-Date -Format "yyyy.MM.dd"
          $packageName = "LOOM-Portable-$tag-$date"

          $args = @(
            "-ExecutionPolicy", "Bypass",
            "-File", "scripts\build-portable.ps1",
            "-Version", $version,
            "-PackageName", $packageName,
            "-SeedPortableDir", $env:PORTABLE_SEED_DIR,
            "-BrandProfile", "lumi",
            "-SkipBuild"
          )
          if (-not [string]::IsNullOrWhiteSpace($env:PHONE_AGENT_VERSION)) {
            $args += @("-PhoneAgentVerifiedVersion", $env:PHONE_AGENT_VERSION)
          }
          if (-not [string]::IsNullOrWhiteSpace($env:PHONE_AGENT_VERSION_CODE) -and $env:PHONE_AGENT_VERSION_CODE -ne "0") {
            $args += @("-PhoneAgentVerifiedVersionCode", $env:PHONE_AGENT_VERSION_CODE)
          }

          & powershell @args

      - name: Collect release assets
        run: |
          $artifactDir = Join-Path $PWD "ci_artifacts"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null

          $version = node -p "require('./openclaw_new_launcher/package.json').version"
          $setupPath = Join-Path $PWD "ci_release_nsis\LOOM-$version-setup.exe"
          $setupHashPath = "$setupPath.sha256.txt"
          if (-not (Test-Path -LiteralPath $setupPath) -or -not (Test-Path -LiteralPath $setupHashPath)) {
            throw "Complete NSIS output is missing: $setupPath"
          }
          Copy-Item -LiteralPath $setupPath -Destination (Join-Path $artifactDir "LOOM-$version-setup.exe")
          Copy-Item -LiteralPath $setupHashPath -Destination (Join-Path $artifactDir "LOOM-$version-setup.exe.sha256.txt")

          Get-ChildItem -LiteralPath (Join-Path $PWD "release") -File -Filter "LOOM-Portable-*.zip*" |
            ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $artifactDir $_.Name) -Force
            }

          $files = @(Get-ChildItem -LiteralPath $artifactDir -File)
          if ($files.Count -eq 0) {
            throw "No release assets were collected"
          }

          foreach ($file in ($files | Where-Object { $_.Name -notlike "*.sha256.txt" })) {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName
            "$($hash.Hash)  $($file.Name)" | Set-Content -LiteralPath "$($file.FullName).sha256.txt" -Encoding ASCII
          }

      - name: Generate Chinese release notes
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          $artifactDir = Join-Path $PWD "ci_artifacts"
          $releaseDir = Join-Path $PWD "ci_release"
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
          $bodyPath = Join-Path $releaseDir "RELEASE_BODY.md"
          $commit = git rev-parse --short HEAD

          $assetLines = Get-ChildItem -LiteralPath $artifactDir -File |
            Where-Object { $_.Name -notlike "*.sha256.txt" } |
            Sort-Object Name |
            ForEach-Object {
              $hashFile = "$($_.FullName).sha256.txt"
              $hashText = if (Test-Path -LiteralPath $hashFile) { (Get-Content -LiteralPath $hashFile -Raw).Trim() } else { "未生成 SHA256" }
              "- `$($_.Name)`：$hashText"
            }

          $body = @(
            "OpenClaw 启动器发布 $env:RELEASE_TAG",
            "",
            "构建提交：$commit",
            "",
            "更新内容：",
            "- 本次发布由 GitHub Actions 自动构建并上传安装包、便携包和 SHA256 校验文件。",
            "- 便携包发布前已执行 ``verify-release.ps1``，检查文件完整性、运行时上下文和敏感配置残留。",
            "- 如果配置了 ``PHONE_AGENT_APK_URL``，手机 Agent 附件会随便携包进入 ``OpenClawFiles\releases\agent-phone``；未配置时主包仍正常发布。",
            "",
            "附件校验：",
            $($assetLines -join "`n"),
            "",
            "使用说明：",
            "- 普通安装优先下载安装包。",
            "- U 盘免安装交付请下载 ``LOOM-Portable-*.zip``，解压后运行 ``LOOM.exe``。",
            "- 下载后建议对照 ``.sha256.txt`` 校验文件完整性。"
          ) -join "`n"
          Set-Content -LiteralPath $bodyPath -Value $body -Encoding UTF8

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: github-release-assets
          path: ci_artifacts/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          name: Lumi / OpenClaw ${{ inputs.tag_name || github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: false
          body_path: ci_release/RELEASE_BODY.md
          files: |
            ci_artifacts/*.exe
            ci_artifacts/*.msi
            ci_artifacts/*.zip
            ci_artifacts/*.sha256.txt

  macos:
    name: macOS release build
    needs: build
    runs-on: macos-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: openclaw_new_launcher/package-lock.json

      - name: Setup Rust
        run: |
          rustup default stable
          rustup show

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            openclaw_new_launcher/src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('openclaw_new_launcher/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        working-directory: openclaw_new_launcher
        run: npm ci

      - name: Verify version consistency
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          version="$(node -p "require('./openclaw_new_launcher/package.json').version")"
          expected="v${version}"
          if [ "$RELEASE_TAG" != "$expected" ]; then
            echo "Release tag mismatch: $RELEASE_TAG, expected $expected"
            exit 1
          fi
          echo "Version consistency check passed: $version"

      - name: Build frontend
        working-directory: openclaw_new_launcher
        run: npm run build

      - name: Check Rust
        working-directory: openclaw_new_launcher/src-tauri
        run: cargo check

      - name: Build macOS bundles
        working-directory: openclaw_new_launcher
        run: npm run tauri -- build --bundles app,dmg

      - name: Collect macOS release assets
        run: |
          set -euo pipefail
          artifact_dir="$PWD/ci_artifacts"
          bundle_dir="$PWD/openclaw_new_launcher/src-tauri/target/release/bundle"
          version="$(node -p "require('./openclaw_new_launcher/package.json').version")"
          mkdir -p "$artifact_dir"

          dmg_path="$(find "$bundle_dir" -type f -name "*.dmg" | head -n 1 || true)"
          if [ -z "$dmg_path" ]; then
            echo "No macOS dmg was produced under $bundle_dir"
            exit 1
          fi
          cp "$dmg_path" "$artifact_dir/OpenClaw-macOS-v${version}.dmg"

          app_path="$(find "$bundle_dir" -type d -name "*.app" | head -n 1 || true)"
          if [ -z "$app_path" ]; then
            echo "No macOS app bundle was produced under $bundle_dir"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$artifact_dir/OpenClaw-macOS-v${version}.app.zip"

          for file in "$artifact_dir"/*; do
            if [ -f "$file" ] && [[ "$file" != *.sha256.txt ]]; then
              shasum -a 256 "$file" | sed "s#  $artifact_dir/#  #" > "$file.sha256.txt"
            fi
          done

      - name: Upload macOS workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: ci_artifacts/*

      - name: Upload macOS assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" ci_artifacts/* --repo "$GITHUB_REPOSITORY" --clobber

          mkdir -p ci_release
          body_path="ci_release/RELEASE_BODY.md"
          commit="$(git rev-parse --short HEAD)"
          assets="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets | sort_by(.name) | .[].name')"

          {
            echo "OpenClaw Launcher $RELEASE_TAG"
            echo ""
            echo "Build commit: $commit"
            echo ""
            echo "本次发布由 GitHub Actions 自动构建 Windows 与 macOS 产物。"
            echo "This release was built by GitHub Actions for both Windows and macOS."
            echo ""
            echo "Assets:"
            while IFS= read -r asset; do
              [ -n "$asset" ] && echo "- \`$asset\`"
            done <<< "$assets"
            echo ""
            echo "Windows:"
            echo "- Use the installer assets for normal installation."
            echo "- Use \`LOOM-Portable-*.zip\` for portable USB-style delivery."
            echo ""
            echo "macOS:"
            echo "- Use \`OpenClaw-macOS-*.dmg\` for normal installation."
            echo "- Use \`OpenClaw-macOS-*.app.zip\` when you need the raw app bundle."
            echo ""
            echo "Security:"
            echo "- Check the matching \`.sha256.txt\` file after downloading."
            echo "- Customer license files, install IDs, API keys, and local account caches are not bundled."
          } > "$body_path"

          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Lumi / OpenClaw $RELEASE_TAG" \
            --notes-file "$body_path" \
            --latest
