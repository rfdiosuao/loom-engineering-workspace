name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Windows checks
    runs-on: windows-latest
    timeout-minutes: 35

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: openclaw_new_launcher/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        run: |
          rustup default stable
          rustup show

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            openclaw_new_launcher/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('openclaw_new_launcher/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Guard tracked artifacts
        run: |
          $base = if ("${{ github.event_name }}" -eq "pull_request") { "origin/${{ github.base_ref }}" } else { "HEAD^" }
          $added = git diff --name-only --diff-filter=A "$base...HEAD" -- release openclaw_new_launcher/node_modules openclaw_new_launcher/src-tauri/target license_server/private_key.b64 license_server/license.db license_server/admin_token.txt
          if ($added) {
            Write-Host "New forbidden tracked artifacts:"
            $added | ForEach-Object { Write-Host "  - $_" }
            exit 1
          }

      - name: Install Python dependencies
        run: python -m pip install -r openclaw_new_launcher\python\requirements.txt

      - name: Run project checks
        run: powershell -ExecutionPolicy Bypass -File scripts\ci-check.ps1
