name: Workspace CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  governance:
    runs-on: windows-latest
    steps:
      - name: Checkout engineering hub
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Validate JSON documents
        shell: powershell
        run: |
          Get-Content -Raw .\workspace.json | ConvertFrom-Json | Out-Null
          Get-Content -Raw .\LOOM.code-workspace | ConvertFrom-Json | Out-Null
          Get-ChildItem .\packages\contracts -Recurse -Filter *.json | ForEach-Object {
            Get-Content -LiteralPath $_.FullName -Raw -Encoding UTF8 | ConvertFrom-Json | Out-Null
          }

      - name: Parse PowerShell scripts
        shell: powershell
        run: |
          $failed = $false
          Get-ChildItem .\scripts\*.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              $errors | ForEach-Object { Write-Error "$($_.Extent.File):$($_.Extent.StartLineNumber) $($_.Message)" }
            }
          }
          if ($failed) { exit 1 }

      - name: Verify default-branch push guard
        shell: powershell
        run: |
          $gitExe = (Get-Command git).Source
          $gitRoot = Split-Path (Split-Path $gitExe -Parent) -Parent
          $sh = Join-Path $gitRoot 'bin\sh.exe'
          $env:LOOM_ALLOW_MAIN_PUSH = '0'
          $ErrorActionPreference = 'Continue'
          'refs/heads/main 111 refs/heads/main 222' | & $sh ./.githooks/pre-push origin https://example.invalid/repo.git 2>&1 | Out-Null
          $blockedExit = $LASTEXITCODE
          $ErrorActionPreference = 'Stop'
          if ($blockedExit -eq 0) { throw 'pre-push hook did not block main' }
          $env:LOOM_ALLOW_MAIN_PUSH = '1'
          'refs/heads/main 111 refs/heads/main 222' | & $sh ./.githooks/pre-push origin https://example.invalid/repo.git
          if ($LASTEXITCODE -ne 0) { throw 'approved emergency bypass failed' }

      - name: Reject sensitive or generated filenames
        shell: powershell
        run: |
          $pattern = '(?i)(^|/)(\.env($|\.)|local\.properties$|.*\.(jks|keystore|p12|pfx|pem|key|db|sqlite|apk|aab|log)$|credentials.*\.json$|.*token.*\.txt$)'
          $blocked = @(git ls-files | Where-Object { $_ -match $pattern })
          if ($blocked.Count -gt 0) {
            $blocked | ForEach-Object { Write-Error "Blocked tracked path: $_" }
            exit 1
          }

      - name: Check whitespace
        shell: powershell
        run: git show --check --format= HEAD
