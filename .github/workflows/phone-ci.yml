name: Phone Agent CI

on:
  pull_request:
    paths:
      - "apps/loom-phone-agent/**"
      - "packages/contracts/**"
      - ".github/workflows/phone-ci.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "apps/loom-phone-agent/**"
      - "packages/contracts/**"
      - ".github/workflows/phone-ci.yml"

permissions:
  contents: read

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        working-directory: apps/loom-phone-agent

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: agent-phone-debug-apk
          path: apps/loom-phone-agent/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
