name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Build APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
            {
              echo "KEYSTORE_FILE=release.keystore"
              echo "KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
              echo "KEY_ALIAS=$ANDROID_KEY_ALIAS"
              echo "KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
            } > local.properties
            ./gradlew assembleRelease --stacktrace
            echo "APK_GLOB=app/build/outputs/apk/release/*.apk" >> "$GITHUB_ENV"
          else
            echo "Signing secrets not configured; building debug APK instead."
            ./gradlew assembleDebug --stacktrace
            echo "APK_GLOB=app/build/outputs/apk/debug/*.apk" >> "$GITHUB_ENV"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-phone-apk
          path: ${{ env.APK_GLOB }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.APK_GLOB }}
          generate_release_notes: true
