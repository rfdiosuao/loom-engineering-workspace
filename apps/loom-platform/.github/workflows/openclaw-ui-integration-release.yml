name: OpenClaw UI Integration Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v2.1.11"
        required: true
        default: "v2.1.11"
        type: string
      openclaw_version:
        description: "OpenClaw npm version. Use latest to resolve npm latest at build time."
        required: true
        default: "2026.6.5"
        type: string
      package_kind:
        description: "Assets to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - source
          - windows-portable
      include_phone_agent_apk:
        description: "Bundle AgentPhone_latest.apk if it exists in the workspace"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build and publish release assets
    runs-on: windows-latest
    timeout-minutes: 90

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: openclaw_ui_integration/package-lock.json

      - name: Resolve OpenClaw version
        run: |
          $version = "${{ inputs.openclaw_version }}"
          if ($version -eq "latest") {
            $version = (npm view openclaw version).Trim()
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Unable to resolve OpenClaw version."
          }
          $safeVersion = $version -replace '[^0-9A-Za-z._-]', '-'
          "OPENCLAW_RUNTIME_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "OPENCLAW_RUNTIME_VERSION_SAFE=$safeVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "OpenClaw runtime version: $version"

      - name: Setup Python
        if: ${{ inputs.package_kind != 'source' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        if: ${{ inputs.package_kind != 'source' }}
        run: |
          rustup default stable
          rustup show

      - name: Cache Cargo
        if: ${{ inputs.package_kind != 'source' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            openclaw_ui_integration/src-tauri/target
          key: ${{ runner.os }}-cargo-ui-integration-${{ hashFiles('openclaw_ui_integration/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ui-integration-
            ${{ runner.os }}-cargo-

      - name: Build source package
        if: ${{ inputs.package_kind == 'all' || inputs.package_kind == 'source' }}
        run: |
          $tag = "${{ inputs.release_tag }}"
          $packageName = "OpenClaw-Launcher-Source-$tag-openclaw-$env:OPENCLAW_RUNTIME_VERSION_SAFE"
          powershell -ExecutionPolicy Bypass -File openclaw_ui_integration\scripts\package-source-ui-integration.ps1 `
            -PackageName $packageName `
            -OpenClawRuntimeVersion $env:OPENCLAW_RUNTIME_VERSION

      - name: Build Windows portable package
        if: ${{ inputs.package_kind == 'all' || inputs.package_kind == 'windows-portable' }}
        run: |
          $tag = "${{ inputs.release_tag }}"
          $packageName = "OpenClaw-Portable-$tag-openclaw-$env:OPENCLAW_RUNTIME_VERSION_SAFE"
          $args = @(
            "-ExecutionPolicy", "Bypass",
            "-File", "openclaw_ui_integration\scripts\build-portable-ui-integration.ps1",
            "-PackageName", $packageName,
            "-OpenClawRuntimeVersion", $env:OPENCLAW_RUNTIME_VERSION
          )
          if ("${{ inputs.include_phone_agent_apk }}" -eq "true") {
            $args += "-IncludePhoneAgentApk"
          }
          & powershell @args

      - name: Collect assets
        run: |
          $artifactDir = Join-Path $PWD "ci_artifacts"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null

          Get-ChildItem -LiteralPath (Join-Path $PWD "release") -File |
            Where-Object { $_.Name -like "OpenClaw-Launcher-Source-*.zip" -or $_.Name -like "OpenClaw-Portable-*.zip" -or $_.Name -like "*.sha256.txt" } |
            ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $artifactDir $_.Name) -Force
            }

          $files = @(Get-ChildItem -LiteralPath $artifactDir -File | Where-Object { $_.Name -notlike "*.sha256.txt" })
          if ($files.Count -eq 0) {
            throw "No release assets were collected."
          }

          foreach ($file in $files) {
            $hashFile = "$($file.FullName).sha256.txt"
            if (-not (Test-Path -LiteralPath $hashFile)) {
              $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName
              "$($hash.Hash)  $($file.Name)" | Set-Content -LiteralPath $hashFile -Encoding ASCII
            }
          }

      - name: Generate release notes
        run: |
          $releaseDir = Join-Path $PWD "ci_release"
          $artifactDir = Join-Path $PWD "ci_artifacts"
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
          $bodyPath = Join-Path $releaseDir "RELEASE_BODY.md"
          $commit = git rev-parse --short HEAD
          $assetLines = Get-ChildItem -LiteralPath $artifactDir -File |
            Where-Object { $_.Name -notlike "*.sha256.txt" } |
            Sort-Object Name |
            ForEach-Object {
              $hashPath = "$($_.FullName).sha256.txt"
              $hashText = if (Test-Path -LiteralPath $hashPath) { (Get-Content -LiteralPath $hashPath -Raw).Trim() } else { "SHA256 not generated" }
              "- `$($_.Name)` - $hashText"
            }

          $body = @(
            "OpenClaw UI Integration ${{ inputs.release_tag }}",
            "",
            "Build commit: $commit",
            "OpenClaw runtime: $env:OPENCLAW_RUNTIME_VERSION",
            "",
            "Assets:",
            $($assetLines -join "`n"),
            "",
            "Notes:",
            "- Source packages are for macOS/Linux adaptation and exclude local runtime state, build output, installers, APKs, and dependency caches.",
            "- Windows portable packages include the launcher runtime and OpenClaw npm runtime pinned to the version above.",
            "- If openclaw_version is set to latest, GitHub Actions resolves npm latest at build time."
          ) -join "`n"
          Set-Content -LiteralPath $bodyPath -Value $body -Encoding UTF8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-ui-integration-release-assets
          path: ci_artifacts/*

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.release_tag }}"
          $title = "OpenClaw UI Integration $tag"
          $bodyPath = Join-Path $PWD "ci_release\RELEASE_BODY.md"
          $assets = Get-ChildItem -LiteralPath (Join-Path $PWD "ci_artifacts") -File | ForEach-Object { $_.FullName }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --repo $env:GITHUB_REPOSITORY --clobber
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $title --notes-file $bodyPath
          }
          else {
            gh release create $tag @assets --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $title --notes-file $bodyPath
          }
