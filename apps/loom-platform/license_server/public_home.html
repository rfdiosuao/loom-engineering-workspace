<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>麓鸣商业授权中心</title>
  <link rel="icon" href="/logo.ico" />
  <style>
    :root {
      color-scheme: light;
      --ink: #10201c;
      --muted: #5f6d68;
      --brand: #075c4e;
      --brand-dark: #032f2d;
      --accent: #daaa45;
      --surface: #f5f7f4;
      --line: #d9e1dc;
      --white: #ffffff;
    }
    * { box-sizing: border-box; }
    html { background: var(--surface); }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--surface);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", system-ui, sans-serif;
      letter-spacing: 0;
    }
    a { color: inherit; }
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(20px, 5vw, 72px);
      color: var(--white);
      background: #052b2e;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; }
    .brand img { width: 34px; height: 34px; object-fit: contain; }
    .admin-link { color: #d9e9e5; text-decoration: none; font-size: 14px; }
    .admin-link:hover { color: var(--white); }
    .hero {
      min-height: 560px;
      display: grid;
      align-content: center;
      padding: 76px clamp(20px, 8vw, 120px) 96px;
      color: var(--white);
      background: var(--brand-dark);
    }
    .hero-inner { max-width: 880px; }
    .eyebrow { color: #72dcc2; font-size: 14px; font-weight: 800; }
    h1 { margin: 16px 0 20px; max-width: 820px; font-size: clamp(42px, 6vw, 76px); line-height: 1.08; letter-spacing: 0; }
    .lead { max-width: 720px; margin: 0; color: #d6e5e1; font-size: 20px; line-height: 1.8; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 34px; }
    .button {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      border: 1px solid transparent;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 800;
    }
    .button.primary { color: #14201c; background: var(--accent); }
    .button.secondary { color: var(--white); border-color: rgba(255,255,255,.34); background: rgba(255,255,255,.06); }
    .proof {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      max-width: 1080px;
      margin: -44px auto 0;
      background: var(--line);
      border: 1px solid var(--line);
      position: relative;
      z-index: 2;
    }
    .proof article { min-height: 156px; padding: 28px; background: var(--white); }
    .proof strong { display: block; margin-bottom: 10px; font-size: 18px; }
    .proof p { margin: 0; color: var(--muted); line-height: 1.7; }
    .footer { max-width: 1080px; margin: 0 auto; padding: 42px 20px 54px; color: var(--muted); font-size: 13px; }
    @media (max-width: 720px) {
      .topbar { padding: 0 18px; }
      .hero { min-height: 520px; padding: 62px 20px 84px; }
      h1 { font-size: 44px; }
      .lead { font-size: 17px; }
      .actions { display: grid; }
      .proof { grid-template-columns: 1fr; margin: 0; border-left: 0; border-right: 0; }
      .proof article { min-height: auto; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><img src="/logo.ico" alt="" />麓鸣商业授权中心</div>
    <a class="admin-link" href="/admin">管理后台</a>
  </header>
  <main>
    <section class="hero">
      <div class="hero-inner">
        <div class="eyebrow">LUMING COMMERCIAL LICENSE</div>
        <h1>让每一套麓鸣能力，都有清晰、可控的商业授权</h1>
        <p class="lead">统一购买授权、绑定设备、管理有效期与服务支持。授权信息由服务器实时校验，关键变更保留审计记录。</p>
        <div class="actions">
          <a class="button primary" href="{{PURCHASE_URL}}" rel="noopener noreferrer">购买授权</a>
          <a class="button secondary" href="{{SUPPORT_URL}}" rel="noopener noreferrer">获取服务支持</a>
        </div>
      </div>
    </section>
    <section class="proof" aria-label="授权能力">
      <article><strong>设备授权</strong><p>按授权额度绑定设备，状态、到期时间和可用能力保持一致。</p></article>
      <article><strong>套餐下发</strong><p>由服务器统一管理套餐、模型渠道和客户端可用功能。</p></article>
      <article><strong>操作留痕</strong><p>关键管理动作写入审计记录，降低误操作和交付风险。</p></article>
    </section>
  </main>
  <footer class="footer">麓鸣 AI 矩阵获客工作台 · 商业授权服务</footer>
</body>
</html>
