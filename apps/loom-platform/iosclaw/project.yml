name: iOSClaw
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  iOSClaw:
    type: application
    platform: iOS
    sources:
      - path: iOSClaw/App/Sources
      - path: iOSClaw/App/Assets.xcassets
    entitlements:
      path: iOSClaw/App/iOSClaw.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.iosclaw
        PRODUCT_NAME: iOSClaw
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: iOSClaw/App/Info.plist
      properties:
        CFBundleDisplayName: iOSClaw
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        NSLocalNetworkUsageDescription: iOSClaw needs local network access so the OpenClaw launcher on your computer can pair with this iPhone.
        NSBonjourServices:
          - _iosclaw._tcp
        NSPhotoLibraryAddUsageDescription: iOSClaw saves images and videos generated by the launcher to your Photos library.
        NSPhotoLibraryUsageDescription: iOSClaw reads only media you explicitly import or share through the launcher.
    dependencies:
      - target: iOSClawBroadcastExtension
        embed: true
  iOSClawBroadcastExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: iOSClaw/BroadcastExtension
    entitlements:
      path: iOSClaw/BroadcastExtension/iOSClawBroadcast.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.iosclaw.broadcast
        PRODUCT_NAME: iOSClawBroadcastExtension
        INFOPLIST_FILE: iOSClaw/BroadcastExtension/Info.plist
        SKIP_INSTALL: true
