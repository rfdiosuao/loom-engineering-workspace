<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LOOM Tutorial Screenshot Annotator</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #111; }
    #canvas { position: relative; width: 1280px; height: 800px; overflow: hidden; }
    #source { display: block; width: 1280px; height: 800px; object-fit: fill; }
    .mark {
      position: absolute;
      border: 4px solid #e2231a;
      border-radius: 8px;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.94), 0 4px 14px rgba(226, 35, 26, 0.3);
      pointer-events: none;
    }
    .badge {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e2231a;
      border: 3px solid #fff;
      color: #fff;
      font: 900 16px/1 "Microsoft YaHei UI", sans-serif;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="canvas">
    <img id="source" alt="LOOM tutorial screenshot">
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const source = document.getElementById('source');
    const canvas = document.getElementById('canvas');
    source.src = params.get('image') || '';
    let marks = [];
    try {
      marks = JSON.parse(params.get('marks') || '[]');
    } catch {
      marks = [];
    }
    for (const item of marks) {
      const pad = Number(item.pad ?? 5);
      const left = Number(item.x) - pad;
      const top = Number(item.y) - pad;
      const mark = document.createElement('div');
      mark.className = 'mark';
      Object.assign(mark.style, {
        left: `${left}px`,
        top: `${top}px`,
        width: `${Number(item.w) + pad * 2}px`,
        height: `${Number(item.h) + pad * 2}px`,
      });
      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.textContent = String(item.n);
      Object.assign(badge.style, {
        left: `${Math.max(4, left - 16)}px`,
        top: `${Math.max(4, top - 16)}px`,
      });
      canvas.append(mark, badge);
    }
  </script>
</body>
</html>
