<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>麓鸣AI矩阵获客工作台 Soundwave Motion</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071b24;
      --line: rgba(188, 245, 255, 0.18);
      --text: #dffaff;
      --muted: #8fb9c4;
      --gold: #ffd36a;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      display: grid;
      grid-template-rows: 1fr auto;
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 24px;
    }
    .stage {
      min-height: min(680px, 70vh);
      display: grid;
      place-items: center;
    }
    #logo-root {
      position: relative;
      width: min(716px, 82vw, 68vh);
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--bg);
      isolation: isolate;
    }
    #static-logo,
    .wave-piece {
      position: absolute;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    #static-logo {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }
    .wave-piece {
      z-index: 2;
      transform-origin: 50% 56%;
      transform: translate3d(0, 0, 0);
      will-change: transform;
      backface-visibility: hidden;
      contain: layout paint style;
      animation: wave-breathe var(--motion-duration, 3200ms) cubic-bezier(0.34, 0, 0.2, 1) var(--delay, 0ms) infinite both;
      animation-play-state: paused;
    }
    .motion-ready .wave-piece { animation-play-state: running; }
    .motion-paused .wave-piece { animation-play-state: paused; }
    .qa-mode .wave-piece {
      animation-iteration-count: 1;
      animation-play-state: paused;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 14px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    button, input[type="range"] { accent-color: var(--gold); }
    button {
      min-height: 36px;
      border: 1px solid var(--line);
      background: #0d2a36;
      color: var(--text);
      border-radius: 8px;
      padding: 0 14px;
      cursor: pointer;
    }
    button[aria-pressed="true"] {
      border-color: rgba(255, 211, 106, 0.72);
      color: #ffe9a6;
    }
    label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .principles {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px auto 0;
    }
    .principles span {
      border: 1px solid var(--line);
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
    }
    .principles span.active {
      border-color: rgba(255, 211, 106, 0.74);
      color: #ffe39b;
    }
    footer {
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      padding: 14px;
    }
    .qa-mode .controls,
    .qa-mode .principles,
    .qa-mode footer,
    .embed-mode .controls,
    .embed-mode .principles,
    .embed-mode footer { display: none; }
    .qa-mode main,
    .embed-mode main {
      width: 100vw;
      height: 100vh;
      padding: 0;
      display: grid;
      place-items: center;
    }
    .qa-mode .stage,
    .embed-mode .stage { min-height: 100vh; }
    .qa-mode #logo-root { width: min(716px, 86vmin); }
    .embed-mode #logo-root { width: min(716px, 100vmin); }

    @keyframes wave-breathe {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }
      28% {
        transform: translate3d(var(--drift-a, 0.36px), var(--rise-a, -1.4px), 0);
      }
      52% {
        transform: translate3d(var(--drift-b, 0.92px), var(--rise-b, -2.4px), 0);
      }
      76% {
        transform: translate3d(var(--drift-c, 0.52px), var(--fall-a, 0.9px), 0);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .wave-piece {
        animation-duration: 6400ms;
      }
      @keyframes wave-breathe {
        0%, 100% { transform: translate3d(0, 0, 0); }
        50% { transform: translate3d(0.3px, -0.7px, 0); }
      }
    }
  </style>
</head>

  <script>
    const DURATION = 3200;
    const READY_EVENT = "loom-motion-ready";
    const params = new URLSearchParams(location.search);
    const qaMode = params.has("t") || params.has("static") || params.has("qa");
    const loopMode = params.has("loop") && !params.has("static") && !params.has("t");
    const embedMode = params.has("embed");
    if (qaMode) document.body.classList.add("qa-mode");
    if (embedMode) document.body.classList.add("embed-mode");

    const root = document.getElementById("logo-root");
    const speed = document.getElementById("speed");
    const replay = document.getElementById("replay");
    const slow = document.getElementById("slow");
    let slowMode = false;

    function mainAnimations() {
      return [...root.getAnimations({ subtree: true })].filter((animation) => animation.effect && animation.effect.target.classList.contains("wave-piece"));
    }
    function setRate(rate) {
      for (const animation of mainAnimations()) animation.playbackRate = rate;
    }
    function seek(ms) {
      document.body.classList.remove("motion-ready");
      for (const animation of mainAnimations()) {
        animation.pause();
        animation.currentTime = Math.max(0, Math.min(DURATION, ms));
      }
      updatePrinciples(ms);
    }
    function updatePrinciples(ms) {
      const active = ms < 520 ? "staging" : ms < 2240 ? "overlap" : "solid";
      document.querySelectorAll(".principles span").forEach((pill) => {
        pill.classList.toggle("active", pill.dataset.phase === active || (active === "overlap" && pill.dataset.phase === "slow"));
      });
    }
    function applyDefaultSpeed() {
      setRate(slowMode ? 0.42 : Number(speed ? speed.value : 0.78));
    }
    function replayMotion() {
      document.body.classList.remove("motion-ready");
      for (const animation of mainAnimations()) {
        animation.cancel();
        animation.play();
      }
      requestAnimationFrame(() => {
        applyDefaultSpeed();
        document.body.classList.add("motion-ready");
      });
    }
    function tuneWavePieces() {
      const pieces = [...root.querySelectorAll(".wave-piece")];
      const last = Math.max(1, pieces.length - 1);
      pieces.forEach((piece, index) => {
        const progress = index / last;
        const crest = Math.sin(progress * Math.PI);
        const rise = 1.2 + crest * 2.8;
        const drift = 0.28 + progress * 1.24;
        piece.style.setProperty("--delay", `${Math.round(index * 78)}ms`);
        piece.style.setProperty("--motion-duration", `${embedMode || loopMode ? 3200 : 3000}ms`);
        piece.style.setProperty("--rise-a", `${-(rise * 0.56).toFixed(2)}px`);
        piece.style.setProperty("--rise-b", `${-rise.toFixed(2)}px`);
        piece.style.setProperty("--fall-a", `${(0.38 + crest * 0.82).toFixed(2)}px`);
        piece.style.setProperty("--drift-a", `${(drift * 0.32).toFixed(2)}px`);
        piece.style.setProperty("--drift-b", `${drift.toFixed(2)}px`);
        piece.style.setProperty("--drift-c", `${(drift * 0.58).toFixed(2)}px`);
      });
    }
    function notifyReady() {
      window.__p2mReady = true;
      window.dispatchEvent(new CustomEvent(READY_EVENT));
      try {
        window.parent.postMessage({
          type: READY_EVENT,
          source: "loom-motion-single",
          nonce: params.get("nonce") || ""
        }, "*");
      } catch (error) {
        // Parent windows can be cross-origin in previews; readiness is still local.
      }
    }
    if (replay) replay.addEventListener("click", replayMotion);
    if (slow) slow.addEventListener("click", () => {
      slowMode = !slowMode;
      slow.setAttribute("aria-pressed", String(slowMode));
      applyDefaultSpeed();
    });
    if (speed) speed.addEventListener("input", () => {
      if (!slowMode) applyDefaultSpeed();
    });
    if (!embedMode) root.addEventListener("click", replayMotion);

    function allImagesReady() {
      const imgs = [...root.querySelectorAll("img")];
      return Promise.all(imgs.map((img) => {
        const decode = img.decode ? img.decode().catch(() => undefined) : Promise.resolve();
        if (img.complete) return decode;
        return new Promise((resolve) => {
          img.addEventListener("load", resolve, { once: true });
          img.addEventListener("error", resolve, { once: true });
        }).then(() => decode);
      }));
    }
    tuneWavePieces();
    allImagesReady().then(() => {
      requestAnimationFrame(() => {
        if (params.has("static")) {
          seek(DURATION);
        } else if (params.has("t")) {
          seek(Number(params.get("t")) || 0);
        } else {
          applyDefaultSpeed();
          document.body.classList.add("motion-ready");
        }
        notifyReady();
      });
    });
  </script>
</body>
</html>
