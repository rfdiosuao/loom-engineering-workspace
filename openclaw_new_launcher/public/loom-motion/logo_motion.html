<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>麓鸣AI矩阵获客工作台 Soundwave Motion</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071b24;
      --line: rgba(188, 245, 255, 0.18);
      --text: #dffaff;
      --muted: #8fb9c4;
      --gold: #ffd36a;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      display: grid;
      grid-template-rows: 1fr auto;
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 24px;
    }
    .stage {
      min-height: min(680px, 70vh);
      display: grid;
      place-items: center;
    }
    #logo-root {
      position: relative;
      width: min(716px, 82vw, 68vh);
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--bg);
      isolation: isolate;
    }
    #static-logo,
    .wave-piece {
      position: absolute;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    #static-logo {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }
    .wave-piece {
      z-index: 2;
      transform-origin: 50% 50%;
      will-change: transform;
      animation: wave-pass 880ms cubic-bezier(0.16, 1, 0.3, 1) var(--delay) both;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 14px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    button, input[type="range"] { accent-color: var(--gold); }
    button {
      min-height: 36px;
      border: 1px solid var(--line);
      background: #0d2a36;
      color: var(--text);
      border-radius: 8px;
      padding: 0 14px;
      cursor: pointer;
    }
    button[aria-pressed="true"] {
      border-color: rgba(255, 211, 106, 0.72);
      color: #ffe9a6;
    }
    label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .principles {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px auto 0;
    }
    .principles span {
      border: 1px solid var(--line);
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
    }
    .principles span.active {
      border-color: rgba(255, 211, 106, 0.74);
      color: #ffe39b;
    }
    footer {
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      padding: 14px;
    }
    .qa-mode .controls,
    .qa-mode .principles,
    .qa-mode footer { display: none; }
    .qa-mode main {
      width: 100vw;
      height: 100vh;
      padding: 0;
      display: grid;
      place-items: center;
    }
    .qa-mode .stage { min-height: 100vh; }
    .qa-mode #logo-root { width: min(716px, 86vmin); }

    @keyframes wave-pass {
      0% { transform: translateY(0) scaleY(1); }
      34% { transform: translateY(var(--rise)) scaleY(1.08); }
      64% { transform: translateY(var(--fall)) scaleY(0.94); }
      100% { transform: translateY(0) scaleY(1); }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage">
      <div id="logo-root" aria-label="麓鸣AI矩阵获客工作台 animated soundwave logo">
        <img id="static-logo" src="source_static-no-wave.png" alt="麓鸣AI矩阵获客工作台 logo">
        <img class="wave-piece" src="wave-pieces/bar_01.png" alt="" style="left:27.9297%;top:68.4570%;width:2.6367%;height:4.3945%;--delay:0ms;--rise:-9.1px;--fall:3.8px">
        <img class="wave-piece" src="wave-pieces/bar_02.png" alt="" style="left:30.0781%;top:67.7734%;width:2.7344%;height:5.6641%;--delay:48ms;--rise:-10.3px;--fall:4.3px">
        <img class="wave-piece" src="wave-pieces/bar_03.png" alt="" style="left:32.1289%;top:66.7969%;width:3.0273%;height:7.6172%;--delay:96ms;--rise:-12.1px;--fall:5.1px">
        <img class="wave-piece" src="wave-pieces/bar_04.png" alt="" style="left:34.1797%;top:67.0898%;width:2.8320%;height:7.0312%;--delay:144ms;--rise:-11.5px;--fall:4.8px">
        <img class="wave-piece" src="wave-pieces/bar_05.png" alt="" style="left:36.1328%;top:64.5508%;width:3.4180%;height:11.8164%;--delay:192ms;--rise:-16.0px;--fall:6.7px">
        <img class="wave-piece" src="wave-pieces/bar_06.png" alt="" style="left:38.3789%;top:65.8203%;width:3.3203%;height:9.6680%;--delay:240ms;--rise:-14.0px;--fall:5.9px">
        <img class="wave-piece" src="wave-pieces/bar_07.png" alt="" style="left:41.3086%;top:62.3047%;width:3.4180%;height:16.7969%;--delay:288ms;--rise:-18.0px;--fall:7.6px">
        <img class="wave-piece" src="wave-pieces/bar_08.png" alt="" style="left:43.0664%;top:65.0391%;width:3.0273%;height:11.7188%;--delay:336ms;--rise:-15.9px;--fall:6.7px">
        <img class="wave-piece" src="wave-pieces/bar_09.png" alt="" style="left:45.2148%;top:62.1094%;width:3.3203%;height:17.2852%;--delay:384ms;--rise:-18.0px;--fall:7.6px">
        <img class="wave-piece" src="wave-pieces/bar_10.png" alt="" style="left:47.6562%;top:63.1836%;width:3.9062%;height:16.5039%;--delay:432ms;--rise:-18.0px;--fall:7.6px">
        <img class="wave-piece" src="wave-pieces/bar_11.png" alt="" style="left:50.6836%;top:65.4297%;width:2.9297%;height:11.8164%;--delay:480ms;--rise:-16.0px;--fall:6.7px">
        <img class="wave-piece" src="wave-pieces/bar_12.png" alt="" style="left:52.4414%;top:63.4766%;width:3.5156%;height:16.2109%;--delay:528ms;--rise:-18.0px;--fall:7.6px">
        <img class="wave-piece" src="wave-pieces/bar_13.png" alt="" style="left:54.8828%;top:66.1133%;width:3.0273%;height:9.8633%;--delay:576ms;--rise:-14.2px;--fall:6.0px">
        <img class="wave-piece" src="wave-pieces/bar_14.png" alt="" style="left:56.6406%;top:64.5508%;width:3.3203%;height:13.2812%;--delay:624ms;--rise:-17.4px;--fall:7.3px">
        <img class="wave-piece" src="wave-pieces/bar_15.png" alt="" style="left:59.0820%;top:67.4805%;width:3.0273%;height:6.9336%;--delay:672ms;--rise:-11.5px;--fall:4.8px">
        <img class="wave-piece" src="wave-pieces/bar_16.png" alt="" style="left:61.1328%;top:66.6992%;width:3.1250%;height:8.6914%;--delay:720ms;--rise:-13.1px;--fall:5.5px">
        <img class="wave-piece" src="wave-pieces/bar_17.png" alt="" style="left:63.4766%;top:67.8711%;width:2.9297%;height:6.0547%;--delay:768ms;--rise:-10.6px;--fall:4.5px">
        <img class="wave-piece" src="wave-pieces/bar_18.png" alt="" style="left:65.7227%;top:68.2617%;width:2.7344%;height:5.2734%;--delay:816ms;--rise:-9.9px;--fall:4.2px">
        <img class="wave-piece" src="wave-pieces/bar_19.png" alt="" style="left:67.9688%;top:68.6523%;width:2.5391%;height:4.1992%;--delay:864ms;--rise:-8.9px;--fall:3.7px">
      </div>
    </section>
    <section class="controls" aria-label="Playback controls">
      <button id="replay" type="button">Replay</button>
      <button id="slow" type="button" aria-pressed="false">Slow</button>
      <label>Speed <input id="speed" type="range" min="0.25" max="1.5" step="0.05" value="0.75"></label>
    </section>
    <section class="principles" aria-label="Animation principles">
      <span data-phase="staging">Staging</span>
      <span data-phase="slow">Slow In/Out</span>
      <span data-phase="overlap">Left-to-right Overlap</span>
      <span data-phase="solid">Solid Drawing</span>
    </section>
  </main>
  <footer>麓鸣AI矩阵获客工作台 soundwave motion</footer>
  <script>
    const DURATION = 2200;
    const params = new URLSearchParams(location.search);
    const qaMode = params.has("t") || params.has("static") || params.has("qa");
    const loopMode = params.has("loop");
    if (qaMode) document.body.classList.add("qa-mode");

    const root = document.getElementById("logo-root");
    const speed = document.getElementById("speed");
    const replay = document.getElementById("replay");
    const slow = document.getElementById("slow");
    let slowMode = false;

    function mainAnimations() {
      return [...root.getAnimations({ subtree: true })].filter((animation) => animation.effect && animation.effect.target.classList.contains("wave-piece"));
    }
    function setRate(rate) {
      for (const animation of mainAnimations()) animation.playbackRate = rate;
    }
    function seek(ms) {
      for (const animation of mainAnimations()) {
        animation.pause();
        animation.currentTime = Math.max(0, Math.min(DURATION, ms));
      }
      updatePrinciples(ms);
    }
    function updatePrinciples(ms) {
      const active = ms < 240 ? "staging" : ms < 1320 ? "overlap" : "solid";
      document.querySelectorAll(".principles span").forEach((pill) => {
        pill.classList.toggle("active", pill.dataset.phase === active || (active === "overlap" && pill.dataset.phase === "slow"));
      });
    }
    function applyDefaultSpeed() {
      setRate(slowMode ? 0.25 : Number(speed.value));
    }
    function replayMotion() {
      for (const animation of mainAnimations()) {
        animation.cancel();
        animation.play();
      }
      requestAnimationFrame(applyDefaultSpeed);
    }
    replay.addEventListener("click", replayMotion);
    slow.addEventListener("click", () => {
      slowMode = !slowMode;
      slow.setAttribute("aria-pressed", String(slowMode));
      applyDefaultSpeed();
    });
    speed.addEventListener("input", () => {
      if (!slowMode) applyDefaultSpeed();
    });
    root.addEventListener("click", replayMotion);

    function allImagesReady() {
      const imgs = [...root.querySelectorAll("img")];
      return Promise.all(imgs.map((img) => img.complete ? Promise.resolve() : new Promise((resolve) => img.addEventListener("load", resolve, { once: true }))));
    }
    allImagesReady().then(() => {
      requestAnimationFrame(() => {
        if (params.has("static")) {
          seek(DURATION);
        } else if (params.has("t")) {
          seek(Number(params.get("t")) || 0);
        } else {
          applyDefaultSpeed();
          if (loopMode) {
            window.setInterval(replayMotion, 1680);
          }
        }
        window.__p2mReady = true;
      });
    });
  </script>
</body>
</html>
